<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RecruitIQ</title>
    <meta name="description" content="Built with caffeine.ai" />
    <meta property="og:title" content="RecruitIQ" />
    <meta property="og:description" content="Built with caffeine.ai" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <script>
      (function() {
        try {
          var settings = JSON.parse(localStorage.getItem('recruitiq_settings') || '{}');
          if (settings.darkMode !== false) {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
